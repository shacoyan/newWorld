<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>こんまに - ダッシュボード</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- アプリ本体（ログイン後に表示） -->
<div id="app-content" style="display:none;">
  <header>
    <a href="index.html" class="header-logo-link" aria-label="今日の画面へ">
      <img src="logo.png" alt="こんまに" class="header-logo">
    </a>
    <h1 class="header-title">統計</h1>
    <div class="user-chip-small">
      <span class="user-initial" id="user-initial"></span>
      <span id="user-name"></span>
    </div>
  </header>

  <main>
    <div class="dash-month-nav">
      <button id="prev-month" class="month-nav-btn" aria-label="前月">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M13 4L7 10L13 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="dash-month-info">
        <div id="dash-month-label" style="font-size:16px;font-weight:700;"></div>
        <div id="period-label" style="font-size:12px;color:var(--text-muted);text-align:center;"></div>
      </div>
      <button id="next-month" class="month-nav-btn" aria-label="次月">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M7 4L13 10L7 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- ① サマリーカード -->
    <div class="section">
      <div class="dash-cards">
        <div class="dash-card">
          <div class="dash-card-label">合計</div>
          <div class="dash-card-value" id="stat-total">¥0</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-label">時給計</div>
          <div class="dash-card-value" id="stat-wage">¥0</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-label">バック計</div>
          <div class="dash-card-value" id="stat-back">¥0</div>
        </div>
        <div class="dash-card">
          <div class="dash-card-label">バック比率</div>
          <div class="dash-card-value" id="stat-back-ratio">0.0%</div>
        </div>
      </div>
    </div>

    <!-- ② 稼働情報 -->
    <div class="section">
      <div class="section-title">稼働情報</div>
      <div class="total-line">
        <span>稼働日数</span>
        <span id="stat-work-days">0日</span>
      </div>
      <div class="total-line">
        <span>平均日給</span>
        <span id="stat-avg-daily">¥0</span>
      </div>
      <div class="total-line">
        <span>最高収入日</span>
        <span id="stat-best-day">—</span>
      </div>
      <div class="total-line">
        <span>稼働時間</span>
        <span id="stat-work-hours">0h 0m</span>
      </div>
      <div class="total-line">
        <span>平均時給</span>
        <span id="stat-avg-hourly">¥0</span>
      </div>
    </div>

    <!-- ③ 品目別バック内訳 -->
    <div class="section">
      <div class="section-title">品目別バック</div>
      <div id="item-breakdown"></div>
    </div>

    <!-- ④ 時給 vs バック 比率バー -->
    <div class="section">
      <div class="section-title">内訳比率</div>
      <div class="ratio-bar-wrap">
        <div class="ratio-bar-wage" id="ratio-bar-wage" style="width:50%">時給 50%</div>
        <div class="ratio-bar-back" id="ratio-bar-back" style="width:50%">バック 50%</div>
      </div>
    </div>
  </main>
</div><!-- /app-content -->

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="common.js"></script>
<script src="firestore-sync.js"></script>
<script src="auth.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
