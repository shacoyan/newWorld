<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>こんまに - 設定</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ログインオーバーレイ -->
<div id="login-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center; flex-direction:column; gap:16px;">
  <div style="background:#fff; border-radius:16px; padding:32px 24px; text-align:center; max-width:320px; width:90%;">
    <img src="logo.png" alt="こんまに" style="height:56px; width:auto; object-fit:contain; margin-bottom:4px;">
    <h2 style="margin-bottom:8px; font-size:20px;">こんまに</h2>
    <p style="color:#6b7280; font-size:14px; margin-bottom:24px;">Googleアカウントでログインしてください</p>
    <button id="login-btn" style="background:#4285f4; color:#fff; border:none; border-radius:8px; padding:12px 24px; font-size:15px; cursor:pointer; width:100%;">Googleでログイン</button>
  </div>
</div>

<!-- アプリ本体（ログイン後に表示） -->
<div id="app-content" style="display:none;">
  <header>
    <a href="index.html" class="btn-back">← 戻る</a>
    <h1 class="header-title">設定</h1>
    <div style="display:flex; align-items:center; gap:8px;">
      <span id="user-name" style="font-size:12px; color:#6b7280;"></span>
      <button id="logout-btn" style="font-size:12px; padding:4px 10px;">ログアウト</button>
    </div>
  </header>

  <main>
    <div class="section">
      <div class="section-title">給与タイプ</div>
      <div class="radio-group">
        <label><input type="radio" name="salaryType" value="fixed"> 固定給</label>
        <label><input type="radio" name="salaryType" value="hourly"> 時給</label>
      </div>
      <div id="fixed-section">
        <div class="time-group">
          <span>固定給</span>
          <input type="number" id="base-salary" min="0" step="1">
          <span>円</span>
        </div>
      </div>
      <div id="hourly-section" style="display:none;">
        <div class="time-group">
          <span>デフォルト時給</span>
          <input type="number" id="default-hourly-rate" min="0" step="1">
          <span>円</span>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">締め期間設定</div>
      <div class="time-group">
        <span>開始日</span>
        <input type="number" id="pay-period-start" min="1" max="28" step="1">
        <span>日（毎月この日から翌月の前日まで）</span>
      </div>
    </div>
    <div class="section">
      <div class="section-title">品目一覧</div>
      <div id="items-list"></div>
      <button id="add-item" class="add-item-btn">+ 品目を追加</button>
    </div>
  </main>
</div><!-- /app-content -->

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="common.js"></script>
<script src="firestore-sync.js"></script>
<script src="auth.js"></script>
<script src="settings.js"></script>
</body>
</html>
