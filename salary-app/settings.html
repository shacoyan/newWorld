<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>こんまに - 設定</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- アプリ本体（ログイン後に表示） -->
<div id="app-content" style="display:none;">
  <header>
    <a href="index.html" class="btn-back">← 戻る</a>
    <h1 class="header-title">設定</h1>
    <div class="user-chip-small">
      <span class="user-initial" id="user-initial"></span>
      <span id="user-name"></span>
    </div>
  </header>

  <main>
    <div class="section">
      <div class="section-title">給与タイプ</div>
      <div class="radio-group">
        <label><input type="radio" name="salaryType" value="hourly"> 時給</label>
        <label><input type="radio" name="salaryType" value="fixed"> 固定給</label>
      </div>
      <div id="hourly-section">
        <div class="time-group">
          <span>デフォルト時給</span>
          <input type="number" id="default-hourly-rate" min="0" step="1">
          <span>円</span>
        </div>
      </div>
      <div id="fixed-section" style="display:none;">
        <div class="time-group">
          <span>固定給</span>
          <input type="number" id="base-salary" min="0" step="1">
          <span>円</span>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">出勤設定</div>
      <div class="time-group">
        <span>デフォルト出勤時刻</span>
        <input type="time" id="default-start-time">
      </div>
      <div class="time-group" style="margin-top:12px;">
        <span>時刻単位</span>
        <label style="display:inline-flex;align-items:center;gap:4px;"><input type="radio" name="timeStep" value="1"> 1分</label>
        <label style="display:inline-flex;align-items:center;gap:4px;margin-left:12px;"><input type="radio" name="timeStep" value="15"> 15分</label>
      </div>
    </div>
    <div class="section">
      <div class="section-title">締め期間設定</div>
      <div class="time-group">
        <span>開始日</span>
        <input type="number" id="pay-period-start" min="1" max="28" step="1">
        <span>日（毎月この日から翌月の前日まで）</span>
      </div>
    </div>
    <div class="section">
      <div class="section-title">品目一覧</div>
      <div id="items-list"></div>
      <button id="add-item" class="add-item-btn">+ 品目を追加</button>
    </div>
    <div class="section" style="margin-top:8px;">
      <button id="logout-btn" class="btn-logout-section">ログアウト</button>
    </div>
  </main>
</div><!-- /app-content -->

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="common.js"></script>
<script src="firestore-sync.js"></script>
<script src="auth.js"></script>
<script src="settings.js"></script>
</body>
</html>
