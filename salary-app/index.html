<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給料計算アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">

        <!-- ヘッダー -->
        <header id="header">
            <h1>給料計算アプリ</h1>
            <div id="total-salary" role="status" aria-live="polite" aria-label="月間給料">¥0</div>
        </header>

        <!-- 設定パネル -->
        <section id="settings-panel">
            <div class="setting-item">
                <label>給与タイプ</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="salary-type" value="fixed" checked>
                        固定給
                    </label>
                    <label>
                        <input type="radio" name="salary-type" value="hourly">
                        時給
                    </label>
                </div>
            </div>
            <div id="fixed-salary-block" class="setting-item">
                <label for="base-salary">固定給</label>
                <input type="number" id="base-salary" value="200000" min="0" max="100000000" step="1">
            </div>
            <div id="hourly-salary-block" class="setting-item" style="display:none;">
                <label for="hourly-rate">時給</label>
                <input type="number" id="hourly-rate" value="1500" min="0" max="1000000" step="1">
            </div>
            <div class="setting-item items-section">
                <label class="items-section-title">品目設定</label>
                <div id="items-list"></div>
                <button type="button" id="add-item">+ 品目を追加</button>
            </div>
        </section>

        <!-- カレンダーセクション -->
        <section id="calendar-section">

            <!-- 月ナビゲーション -->
            <nav id="month-nav">
                <button id="prev-month">&lt;</button>
                <span id="current-month-label"></span>
                <button id="next-month">&gt;</button>
            </nav>

            <!-- カレンダーグリッド -->
            <div id="calendar-grid"></div>

        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
