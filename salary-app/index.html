<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給料計算アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">

        <!-- ヘッダー -->
        <header id="header">
            <h1>給料計算アプリ</h1>
            <div id="total-salary">¥0</div>
        </header>

        <!-- 設定パネル -->
        <section id="settings-panel">
            <div class="setting-item">
                <label for="base-salary">基本給</label>
                <input type="number" id="base-salary" value="200000" min="0" max="100000000" step="1">
            </div>
            <div class="setting-item">
                <label for="reward-per-achievement">成果単価</label>
                <input type="number" id="reward-per-achievement" value="1000" min="0" max="1000000" step="1">
            </div>
        </section>

        <!-- カレンダーセクション -->
        <section id="calendar-section">

            <!-- 月ナビゲーション -->
            <nav id="month-nav">
                <button id="prev-month">&lt;</button>
                <span id="current-month-label"></span>
                <button id="next-month">&gt;</button>
            </nav>

            <!-- カレンダーグリッド -->
            <div id="calendar-grid"></div>

        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
