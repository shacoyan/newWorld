<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>こんまに - 給料管理アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="lp-body">

  <!-- ヒーローセクション -->
  <section class="lp-hero">
    <div class="lp-hero-inner">
      <img src="logo.png" alt="こんまに" class="lp-logo">
      <h1 class="lp-title">こんまに</h1>
      <p class="lp-subtitle">バック・時給・出勤を記録して<br>今月いくら稼いだか一目でわかる</p>
      <button id="lp-login-btn" class="lp-login-btn">Googleでログイン</button>
      <p class="lp-note">無料・登録不要・Googleアカウントだけ</p>
    </div>
  </section>

  <!-- 機能紹介セクション -->
  <section class="lp-features">
    <div class="lp-feature-card">
      <div class="lp-feature-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lp-cal-grad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#f472b6"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <!-- カレンダー本体 -->
          <rect x="4" y="10" width="40" height="34" rx="6" fill="white" stroke="#f4a8d4" stroke-width="1.5"/>
          <!-- ヘッダー -->
          <rect x="4" y="10" width="40" height="12" rx="6" fill="url(#lp-cal-grad)"/>
          <rect x="4" y="16" width="40" height="6" fill="url(#lp-cal-grad)"/>
          <!-- フック左 -->
          <rect x="14" y="6" width="4" height="8" rx="2" fill="#a78bfa"/>
          <!-- フック右 -->
          <rect x="30" y="6" width="4" height="8" rx="2" fill="#f472b6"/>
          <!-- グリッド小rect -->
          <rect x="9"  y="28" width="6" height="5" rx="1.5" fill="#fce7f3"/>
          <rect x="21" y="28" width="6" height="5" rx="1.5" fill="#fce7f3"/>
          <rect x="33" y="28" width="6" height="5" rx="1.5" fill="#fce7f3"/>
          <rect x="9"  y="36" width="6" height="5" rx="1.5" fill="#f5f3ff"/>
          <rect x="21" y="36" width="6" height="5" rx="1.5" fill="#f5f3ff"/>
          <rect x="33" y="36" width="6" height="5" rx="1.5" fill="#f5f3ff"/>
        </svg>
      </div>
      <div class="lp-feature-title">カレンダーで管理</div>
      <div class="lp-feature-desc">出勤日・時刻・バック数をカレンダーに記録。月をまたいだ集計も自動。</div>
    </div>
    <div class="lp-feature-card">
      <div class="lp-feature-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lp-coin-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#a78bfa"/>
              <stop offset="100%" stop-color="#f472b6"/>
            </linearGradient>
          </defs>
          <!-- コイン -->
          <circle cx="24" cy="24" r="20" fill="url(#lp-coin-grad)"/>
          <circle cx="24" cy="24" r="16" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
          <!-- ¥テキスト -->
          <text x="24" y="31" text-anchor="middle" font-size="20" font-weight="800" fill="white" font-family="sans-serif">¥</text>
        </svg>
      </div>
      <div class="lp-feature-title">給料を自動計算</div>
      <div class="lp-feature-desc">固定給＋バック、時給＋バック、どちらのタイプも対応。</div>
    </div>
    <div class="lp-feature-card">
      <div class="lp-feature-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lp-bar1-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#f472b6"/>
              <stop offset="100%" stop-color="#e879a0"/>
            </linearGradient>
            <linearGradient id="lp-bar2-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#a78bfa"/>
              <stop offset="100%" stop-color="#818cf8"/>
            </linearGradient>
            <linearGradient id="lp-bar3-grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#bae6fd"/>
              <stop offset="100%" stop-color="#67e8f9"/>
            </linearGradient>
          </defs>
          <!-- 底辺ライン -->
          <line x1="6" y1="40" x2="42" y2="40" stroke="rgba(167,139,250,0.35)" stroke-width="1.5" stroke-linecap="round"/>
          <!-- 棒グラフ -->
          <rect x="9"  y="20" width="8" height="20" rx="3" fill="url(#lp-bar1-grad)"/>
          <rect x="20" y="12" width="8" height="28" rx="3" fill="url(#lp-bar2-grad)"/>
          <rect x="31" y="26" width="8" height="14" rx="3" fill="url(#lp-bar3-grad)"/>
        </svg>
      </div>
      <div class="lp-feature-title">統計ダッシュボード</div>
      <div class="lp-feature-desc">バック比率・平均日給・最高収入日など月の成績を振り返れる。</div>
    </div>
    <div class="lp-feature-card">
      <div class="lp-feature-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lp-cloud-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#e0f2fe"/>
              <stop offset="100%" stop-color="#bae6fd"/>
            </linearGradient>
            <linearGradient id="lp-cloud-stroke-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#7dd3fc"/>
              <stop offset="100%" stop-color="#38bdf8"/>
            </linearGradient>
          </defs>
          <!-- 雲：複数楕円を重ね合わせ -->
          <ellipse cx="24" cy="30" rx="16" ry="9" fill="url(#lp-cloud-grad)"/>
          <ellipse cx="18" cy="27" rx="9"  ry="8" fill="url(#lp-cloud-grad)"/>
          <ellipse cx="30" cy="26" rx="10" ry="9" fill="url(#lp-cloud-grad)"/>
          <ellipse cx="22" cy="21" rx="9"  ry="8" fill="url(#lp-cloud-grad)"/>
          <!-- アウトライン -->
          <ellipse cx="24" cy="30" rx="16" ry="9" fill="none" stroke="url(#lp-cloud-stroke-grad)" stroke-width="1.2"/>
          <ellipse cx="22" cy="21" rx="9"  ry="8" fill="none" stroke="url(#lp-cloud-stroke-grad)" stroke-width="1.2"/>
          <ellipse cx="30" cy="26" rx="10" ry="9" fill="none" stroke="url(#lp-cloud-stroke-grad)" stroke-width="1.2"/>
        </svg>
      </div>
      <div class="lp-feature-title">どこからでもアクセス</div>
      <div class="lp-feature-desc">Googleログインでデータをクラウド保存。スマホ・PCどちらでも。</div>
    </div>
  </section>

  <!-- 下部CTA -->
  <section class="lp-cta">
    <button id="lp-login-btn-2" class="lp-login-btn">Googleでログイン</button>
  </section>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="lp.js"></script>
</body>
</html>
